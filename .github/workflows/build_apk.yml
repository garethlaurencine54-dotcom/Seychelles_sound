name: Build Flutter APK

on:
  push:
    branches:
      - main  # Triggers the build every time you push code to the main branch
  workflow_dispatch: # Allows you to manually click a button on GitHub to build anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Plugs in your fresh, updated Firebase configuration safely
      - name: Decode Google Services JSON
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json

      # Decodes the exact permanent keystore file we generated on your server
      # Cleans up any accidental spaces/newlines from copying on mobile
      - name: Decode Permanent Keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\n' | tr -d ' ' | base64 --decode > ~/.android/debug.keystore

      - name: Print SHA-1 fingerprint (Verified Permanent Key)
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # Builds a debug APK which bypasses strict signing requirements

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seychelles-sound-app
          path: build/app/outputs/flutter-apk/app-debug.apk
