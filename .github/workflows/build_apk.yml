name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Load Permanent Keystore Cache
        id: cache-keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: permanent-seychelles-keystore-v1

      - name: Auto-Generate Keystore If Missing
        if: steps.cache-keystore.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Verify Keystore Fingerprint
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Gradle Signing Report
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport

      - name: Build APK
        run: flutter build apk --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seychelles-sound-app
          path: build/app/outputs/flutter-apk/app-debug.apk
