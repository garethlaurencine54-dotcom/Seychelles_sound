name: Build Flutter APK (Debug)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Restore Pinned Debug Keystore
        run: |
          mkdir -p ~/.android
          echo "${{ secrets.DEBUG_KEYSTORE_BASE64 }}" | base64 --decode > ~/.android/debug.keystore

      - name: Verify Keystore Fingerprint
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Run Gradle Signing Report
        run: |
          cd android
          chmod +x gradlew
          ./gradlew signingReport

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seychelles-sound-app
          path: build/app/outputs/flutter-apk/app-debug.apk
