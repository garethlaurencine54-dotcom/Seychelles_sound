name: Build Flutter APK

on:
  push:
    branches:
      - main  # Triggers the build every time you push code to the main branch
  workflow_dispatch: # Allows you to manually click a button on GitHub to build anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # Reuses the SAME debug signing key on every build instead of a fresh
      # random one each time â€” otherwise Google Sign-In's SHA-1 whitelist
      # in Firebase would break on every new commit.
      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: debug-keystore-v1

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Print SHA-1 fingerprint (copy this into Firebase)
        run: |
          keytool -list -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -storepass android -keypass android

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # Builds a debug APK which bypasses strict signing requirements

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seychelles-sound-app
          path: build/app/outputs/flutter-apk/app-debug.apk
