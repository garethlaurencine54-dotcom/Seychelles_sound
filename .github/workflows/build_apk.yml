name: Build Flutter APK

on:
  push:
    branches:
      - main  # Triggers the build every time you push code to the main branch
  workflow_dispatch: # Allows you to manually click a button on GitHub to build anytime

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug # Builds a debug APK which bypasses strict signing requirements

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seychelles-sound-app
          path: build/app/outputs/flutter-apk/app-debug.apk

