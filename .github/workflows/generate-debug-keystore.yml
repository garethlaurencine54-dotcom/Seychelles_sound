name: Generate Debug Keystore (run once, then you can delete this file)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Print SHA-1 fingerprint (copy this into Firebase)
        run: keytool -list -v -keystore debug.keystore -storepass android -alias androiddebugkey | grep "SHA1:"

      - name: Print base64 keystore (copy this into a GitHub secret)
        run: base64 -w 0 debug.keystore
